      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      padding: 0 0 48px;

      position: relative;

    .site-header p {

      color: rgba(255,255,255,0.65);
      margin-top: 6px;
      position: relative;
    }

    .main { max-width: 700px; margin: 0 auto; padding: 0 16px; }

      border-left: 4px solid var(--gold);

    .np-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .np-title {
      font-family: var(--ff-head);
      font-size: 1.15rem;
      color: var(--ink);
      margin-bottom: 3px;
      min-height: 1.5em;
    }
    .np-subtitle { font-size: 0.85rem; color: var(--ink-lt); margin-bottom: 14px; }

    audio {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
      accent-color: var(--blue);
    }
    .np-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .dl-btn {
      font-size: 0.85rem;
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
      display: none;
    }
    .dl-btn:hover { text-decoration: underline; }

      background: var(--blue-lt);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 0.83rem;
      color: var(--ink-mid);
      line-height: 1.9;
      display: none;
    }

    /* ── FILTER BAR ──────────────────────────────────── */
    .filter-bar {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px 16px 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .year-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .year-tab {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--gold-lt);
      background: transparent;
      font-family: var(--ff-body);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink-mid);
      cursor: pointer;
      transition: all 0.15s;
    }
    .year-tab:hover { border-color: var(--gold); color: var(--gold); }
    .year-tab.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
    }

      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-lt);
      margin-bottom: 8px;
    }
    .month-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .chip {
      padding: 4px 11px;
      border-radius: 999px;
      border: 1.5px solid #ddd;
      background: transparent;
      font-family: var(--ff-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--blue); color: var(--blue); }
    .chip.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    .chip.all { font-weight: 600; }

    /* Search */
    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      color: var(--ink-lt);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-family: var(--ff-body);
      font-size: 0.88rem;
      color: var(--ink);
      background: var(--cream);
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--blue); }
    #search::placeholder { color: var(--ink-lt); }

      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 0 2px;

    .list-label {

      font-weight: 600;

      text-transform: uppercase;
      color: var(--ink-lt);

      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);

    .empty-state {
      padding: 32px 20px;
      text-align: center;
      color: var(--ink-lt);
      font-size: 0.9rem;

    .track {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      gap: 12px;
      cursor: pointer;
      border-bottom: 1px solid #f3ede3;
      transition: background 0.12s;
    }
    .track:last-child { border-bottom: none; }
    .track:hover { background: #fdf8f0; }
    .track.active { background: #eef5ff; }

    .track-num {
      width: 28px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--ink-lt);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .track.active .track-num { color: var(--blue); font-weight: 700; }

    .track-icon {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--warm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.9rem;
      transition: all 0.15s;

    .track.active .track-icon { background: var(--blue); }

    .track-name {

      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

      text-align: center;
      font-size: 0.8rem;
      color: var(--ink-lt);
      padding: 28px 16px 0;
    }

</head>

  9:"Tháng 9", 10:"Tháng 10", 11:"Tháng 11", 12:"Tháng 12"
};

// Derive unique years/months
const years  = [...new Set(tracks.map(t => t.year))].sort();
let activeYear  = years[0];
let activeMonth = 0; // 0 = all
let searchQ  = "";
let activeIdx = -1;

// Refs
const yearTabsEl  = document.getElementById("year-tabs");
const monthChipsEl= document.getElementById("month-chips");
const searchEl    = document.getElementById("search");
const playlistEl  = document.getElementById("playlist");
const listCountEl = document.getElementById("list-count");
const player      = document.getElementById("player");
const playerSrc   = document.getElementById("player-src");
const npTitle     = document.getElementById("np-title");
const npSubtitle  = document.getElementById("np-subtitle");
const dlBtn       = document.getElementById("dl-btn");
const infoBox     = document.getElementById("info-box");
const infoLiturgy = document.getElementById("info-liturgy");
const infoSong    = document.getElementById("info-song");

// ── BUILD YEAR TABS ──────────────────────────────────
function buildYearTabs() {
  yearTabsEl.innerHTML = "";
  years.forEach(function(y) {
    const btn = document.createElement("button");
    btn.className = "year-tab" + (y === activeYear ? " active" : "");
    btn.textContent = "Năm " + y;
    btn.setAttribute("aria-pressed", y === activeYear);
    btn.addEventListener("click", function() {
      activeYear  = y;
      activeMonth = 0;
      searchEl.value = "";
      searchQ = "";
      buildYearTabs();
      buildMonthChips();
      renderPlaylist();
    });
    yearTabsEl.appendChild(btn);
  });
}

// ── BUILD MONTH CHIPS ────────────────────────────────
function buildMonthChips() {
  monthChipsEl.innerHTML = "";
  const months = [...new Set(
    tracks.filter(t => t.year === activeYear).map(t => t.month)
  )].sort(function(a,b){ return a-b; });

  // "Tất cả" chip
  const allChip = document.createElement("button");
  allChip.className = "chip all" + (activeMonth === 0 ? " active" : "");
  allChip.textContent = "Tất cả";
  allChip.addEventListener("click", function() {
    activeMonth = 0;
    buildMonthChips();
    renderPlaylist();
  });
  monthChipsEl.appendChild(allChip);

  months.forEach(function(m) {
    const chip = document.createElement("button");
    chip.className = "chip" + (m === activeMonth ? " active" : "");
    chip.textContent = "T" + m;
    chip.setAttribute("title", MONTH_NAMES[m]);
    chip.setAttribute("aria-label", MONTH_NAMES[m]);
    chip.addEventListener("click", function() {
      activeMonth = m;
      buildMonthChips();
      renderPlaylist();
    });
    monthChipsEl.appendChild(chip);
  });
}

// ── FILTER ───────────────────────────────────────────
function filteredTracks() {
  return tracks.filter(function(t) {
    if (t.year !== activeYear) return false;
    if (activeMonth !== 0 && t.month !== activeMonth) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      return t.title.toLowerCase().includes(q) ||
             t.subtitle.toLowerCase().includes(q);
    }
    return true;
  });
}

// ── RENDER PLAYLIST ──────────────────────────────────
function renderPlaylist() {
  playlistEl.innerHTML = "";
  const list = filteredTracks();

  listCountEl.textContent = list.length + " bài";

  if (list.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "Không tìm thấy bài nào.";
    playlistEl.appendChild(empty);
    return;
  }

  list.forEach(function(t, i) {
    const globalIdx = tracks.indexOf(t);
    const isActive  = globalIdx === activeIdx;

    const div = document.createElement("div");
    div.className = "track" + (isActive ? " active" : "");
    div.setAttribute("role", "button");
    div.setAttribute("tabindex", "0");
    div.setAttribute("aria-label", "Phát " + t.title);
    div.innerHTML =
      '<div class="track-num">' + (i + 1) + '</div>' +
      '<div class="track-icon">' + (isActive ? "▶" : "🎵") + '</div>' +
      '<div class="track-info">' +
        '<div class="track-name">' + t.title + '</div>' +
        '<div class="track-meta">' + t.subtitle + '</div>' +
      '</div>' +
      (isActive ? '<span class="track-badge">Đang phát</span>' : '');

    div.addEventListener("click", function() { loadTrack(globalIdx); });
    div.addEventListener("keydown", function(e) {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); loadTrack(globalIdx); }
    });
    playlistEl.appendChild(div);
  });
}

// ── LOAD TRACK ───────────────────────────────────────
function loadTrack(globalIdx) {
  const t   = tracks[globalIdx];
  const url = BASE + t.file;

  playerSrc.src = url;
  player.load();
  player.play();
  player.setAttribute("aria-label", "Nghe " + t.title);

  npTitle.textContent     = "🎵 " + t.title;
  npSubtitle.textContent  = t.subtitle;
  dlBtn.href              = url;
  dlBtn.setAttribute("download", t.download);
  dlBtn.style.display     = "inline";
  infoLiturgy.textContent = t.liturgy;
  infoSong.textContent    = t.song;
  infoBox.style.display   = "block";

  activeIdx = globalIdx;
  renderPlaylist();
}

// ── SEARCH ───────────────────────────────────────────
searchEl.addEventListener("input", function() {
  searchQ = searchEl.value.trim();
  renderPlaylist();
});

// ── AUTO-ADVANCE ─────────────────────────────────────
player.addEventListener("ended", function() {
  const list = filteredTracks();
  const cur  = list.findIndex(function(t) { return tracks.indexOf(t) === activeIdx; });
  if (cur >= 0 && cur < list.length - 1) {
    loadTrack(tracks.indexOf(list[cur + 1]));
  }
});

// ── INIT ─────────────────────────────────────────────
buildYearTabs();
buildMonthChips();
renderPlaylist();
</script>
</body>
</html>
